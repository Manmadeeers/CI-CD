<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CI/CD form</title>
</head>
<body>
    <form>
        <div class="form-group">
            <label>Name: </label>
            <input type="text">
        </div>
        <div class="form-group">
            <label>Phone: </label>
            <input type="tel">
        </div>
        <div class="form-group">
            <label>Email: </label>
            <input type="email">
        </div>
        <div class="form-group">
            <label>Date of birth: </label>
            <input type="date">
        </div>
        <div class="form-group">
            <label>Password: </label>
            <input type="password">
        </div>
    </form>
</body>
</html>
